<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Todo Card</title>
    <!-- <link rel="stylesheet" href="/src/style.css"> -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root">
      <article class="todo-card" data-testid="test-todo-card">
        <div class="todo-header">
          <div class="todo-title-group">
            <label class="checkbox-container">
              <input type="checkbox" class="todo-checkbox" data-testid="test-todo-complete-toggle" aria-label="Mark task as complete">
            </label>
            <h2 class="todo-title" data-testid="test-todo-title">Design System Audit</h2>
          </div>
          <span class="badge badge-priority-high" data-testid="test-todo-priority" aria-label="Priority: High">High</span>
        </div>

        <p class="todo-description" data-testid="test-todo-description">
          Review the current component library for consistency, accessibility, and performance bottlenecks. Document findings in the wiki.
        </p>

        <div class="todo-meta">
          <div class="meta-item">
            <span class="badge badge-status-progress" data-testid="test-todo-status">In Progress</span>
          </div>
          <div class="meta-item">
            <time class="due-date" datetime="2026-04-15T10:00:00" data-testid="test-todo-due-date">Due Apr 15, 2026</time>
          </div>
          <div class="meta-item">
            <time class="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">Calculating...</time>
          </div>
        </div>

        <ul class="todo-tags" data-testid="test-todo-tags" role="list">
          <li class="tag" data-testid="test-todo-tag-work">Work</li>
          <li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
          <li class="tag">Design</li>
        </ul>

        <div class="todo-actions">
          <button class="btn btn-edit" data-testid="test-todo-edit-button" aria-label="Edit task">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
          </button>
          <button class="btn btn-delete" data-testid="test-todo-delete-button" aria-label="Delete task">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
          </button>
        </div>
      </article>
    </div>
    <script src="script.js"></script>
  </body>
</html>
